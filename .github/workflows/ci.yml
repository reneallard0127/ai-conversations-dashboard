name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Instalar dependencias backend
        working-directory: ./backend
        run: npm ci

      - name: Build imagen Docker backend
        run: docker build -t ai-dashboard-backend ./backend

      - name: Build imagen Docker frontend
        run: docker build -t ai-dashboard-frontend ./frontend